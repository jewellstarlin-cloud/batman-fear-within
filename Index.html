<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATMAN: FEAR WITHIN - UNREAL EDITION</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        /* Cinema Bars */
        #top, #bot { position: fixed; width: 100%; height: 12%; background: #000; z-index: 100; left: 0; }
        #bot { bottom: 0; }
        #ui { position: absolute; top: 15%; left: 30px; color: #f00; font-family: 'Courier New', monospace; z-index: 110; text-shadow: 0 0 20px #f00; pointer-events: none; }
    </style>
</head>
<body>
    <div id="top"></div><div id="bot"></div>
    <div id="ui">PHASE: NIGHTMARE_ACT_1<br>FEAR_LEVEL: CRITICAL</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

<script type="module">
import * as THREE from 'three';

// 1. ENGINE SETUP (MAXED)
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010103);
scene.fog = THREE.FogExp2(0x050510, 0.002);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 5000);
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.5;
document.body.appendChild(renderer.domElement);

// 2. THE ROAD (WET ASPHALT)
const roadGeo = new THREE.PlaneGeometry(2000, 20000);
const roadMat = new THREE.MeshStandardMaterial({ 
    color: 0x0a0a0f, 
    roughness: 0.1, 
    metalness: 0.8,
    envMapIntensity: 1 
});
const road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
scene.add(road);

// 3. INDUSTRIAL MONOLITHS (Buildings)
const bGroup = new THREE.Group();
for (let i = 0; i < 100; i++) {
    const h = 400 + Math.random() * 1500;
    const w = 150 + Math.random() * 200;
    const bGeo = new THREE.BoxGeometry(w, h, w);
    const bMat = new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.5 });
    const b = new THREE.Mesh(bGeo, bMat);
    
    b.position.set(Math.random() > 0.5 ? 500 + Math.random()*300 : -500 - Math.random()*300, h/2, -i * 300);
    bGroup.add(b);

    // Add Glowing Industrial Windows
    if(Math.random() > 0.6) {
        const pLight = new THREE.PointLight(0xffaa00, 800, 300);
        pLight.position.set(b.position.x * 0.8, h * 0.6, b.position.z);
        scene.add(pLight);
    }
}
scene.add(bGroup);

// 4. NIGHTMARE BATMAN (Cinematic Silhouette)
const player = new THREE.Group();
const body = new THREE.Mesh(new THREE.ConeGeometry(10, 40, 4), new THREE.MeshBasicMaterial({color: 0x000000}));
player.add(body);

const eyes = new THREE.PointLight(0xff0000, 150, 100);
eyes.position.set(0, 25, -10);
player.add(eyes);
scene.add(player);

// 5. VOLUMETRIC RAIN
const rainGeo = new THREE.BufferGeometry();
const rainCount = 1500;
const rainData = new Float32Array(rainCount * 3);
for(let i=0; i<rainCount*3; i++) rainData[i] = (Math.random() - 0.5) * 4000;
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainData, 3));
const rainMat = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.7, transparent: true, opacity: 0.4 });
const rain = new THREE.Points(rainGeo, rainMat);
scene.add(rain);

// 6. MOTION & CONTROLS
let speed = 0, yaw = 0, lx = 0;
window.addEventListener('touchstart', e => { lx = e.touches[0].clientX; speed = 25; });
window.addEventListener('touchmove', e => { 
    const tx = e.touches[0].clientX;
    yaw -= (tx - lx) * 0.005;
    lx = tx;
});
window.addEventListener('touchend', () => { speed = 0; });

// 7. RENDER LOOP
function animate() {
    requestAnimationFrame(animate);
    
    // Smooth Movement
    player.position.z -= speed * Math.cos(yaw);
    player.position.x -= speed * Math.sin(yaw);
    player.rotation.y = yaw;

    // Cinematic Follow Cam (Spring Physics)
    const camTargetZ = player.position.z + 180;
    const camTargetX = player.position.x + Math.sin(yaw) * 100;
    camera.position.lerp(new THREE.Vector3(camTargetX, 80, camTargetZ), 0.1);
    camera.lookAt(player.position.x, 40, player.position.z - 300);

    // Infinite Rain
    rain.position.z = player.position.z;
    rain.position.y -= 10;
    if(rain.position.y < -1000) rain.position.y = 1000;

    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
